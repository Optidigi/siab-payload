# Dev Postgres for siab-payload.
# This compose file is deployed to the VPS (e.g. ~/siab-payload-dev/) and run there.
# Local development reaches it via:  ssh -L 5432:localhost:5433 -N -f prod
# The tunnel maps local 5432 -> VPS 5433, so DATABASE_URI in .env.example
# (postgres://payload:.../localhost:5432/payload) just works.
# See README.md for the full local-dev workflow.
services:
  postgres:
    image: postgres:17-alpine
    container_name: siab-payload-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"   # 5433 on host keeps 5432 free for the production stack (Phase 18)
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - siab-payload-postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  siab-payload-postgres-dev:
